behavior:
  name: behavior-progress-monitor
  version: 1.0.0
  description: Detects analysis paralysis patterns and injects corrective prompts
  hooks:
  - class: amplifier_foundation.hooks.progress_monitor.ProgressMonitorHook
    config:
      enabled: true
      read_threshold: 30
      same_file_threshold: 3
      warning_interval: 15

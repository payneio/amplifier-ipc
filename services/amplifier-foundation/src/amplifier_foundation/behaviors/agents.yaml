behavior:
  name: behavior-agents
  version: 2.0.0
  description: 'Agent orchestration capability with enhanced delegate tool.


    Features:

    - Two-parameter context inheritance (depth + scope)

    - Session resume (use full session_id from delegate calls)

    - Fixed tool inheritance (agent declarations honored)

    - Multi-agent collaboration patterns


    Note: This behavior uses the NEW delegate tool. For legacy task tool,

    use the ''tasks'' behavior instead.

    '
  tools:
  - class: amplifier_foundation.tools.delegate.DelegateTool
    config:
      features:
        self_delegation:
          enabled: true
        session_resume:
          enabled: true
        context_inheritance:
          enabled: true
          max_turns: 10
        provider_selection:
          enabled: true
      settings:
        exclude_tools:
        - tool-delegate
        exclude_hooks: []
  - class: amplifier_skills.tools.skills.SkillsTool
    config:
      skills:
      - git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=skills
  context:
    include:
    - context/agents/delegation-instructions.md
    - context/agents/multi-agent-patterns.md

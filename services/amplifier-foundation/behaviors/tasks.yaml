behavior:
  name: behavior-tasks
  version: 1.0.0
  description: 'Legacy task tool behavior for backwards compatibility.

    For new development, consider using the ''agents'' behavior with the

    enhanced delegate tool (two-parameter context, short session IDs, etc.)

    '
  tools:
  - class: amplifier_foundation.tools.task.TaskTool
    config:
      exclude_tools:
      - tool-task
  context:
    include:
    - context/agents/delegation-instructions.md
    - context/agents/multi-agent-patterns.md

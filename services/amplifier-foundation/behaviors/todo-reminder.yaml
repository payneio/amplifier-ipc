behavior:
  name: behavior-todo-reminder
  version: 1.1.0
  description: Todo tracking with automatic context reminders and visual progress
    display
  tools:
  - class: amplifier_foundation.tools.todo.TodoTool
  hooks:
  - class: amplifier_foundation.hooks.todo_reminder.TodoReminderHook
    config:
      inject_role: user
      priority: 10
  - class: amplifier_foundation.hooks.todo_display.TodoDisplayHook
    config:
      show_progress_bar: true
      show_border: true

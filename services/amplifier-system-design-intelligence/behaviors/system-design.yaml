bundle:
  name: project-architect
  version: 0.2.0
  description: >-
    Architecture analysis bundle. Three agents split by cognitive task
    (surveyor for scoping, explorer for understanding, critic for judgment),
    three skills encoding reusable methodology, and two recipes for dispatched
    analysis pipelines.

agents:
  include:
    - project-architect:test-agent
    - project-architect:project-surveyor
    - project-architect:code-explorer
    - project-architect:architecture-critic

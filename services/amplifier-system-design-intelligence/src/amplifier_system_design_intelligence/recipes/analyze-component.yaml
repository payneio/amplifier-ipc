name: "analyze-component"
description: "Full architecture analysis pipeline: survey the codebase landscape, explore target components in depth, then evaluate and produce a structured report"
version: "1.0.0"
tags: ["architecture", "analysis", "pipeline"]

context:
  target: ""
  report_type: "review"

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Survey — scope the landscape and identify what to explore
  # ---------------------------------------------------------------------------
  - id: "survey"
    agent: "project-architect:project-surveyor"
    timeout: 300
    output: "survey_document"
    prompt: |
      Scan the codebase landscape for the following target:

        Target: {{target}}

      Your job is to produce a survey document that scopes this analysis. Identify:
        - The primary components and modules involved
        - The key relationships and dependencies between them
        - Specific exploration targets: files, classes, functions, data paths to investigate in depth
        - Evaluation focus areas: what the architecture-critic should assess
        - Entry points, boundaries, and interfaces

      This analysis will produce a {{report_type}} report, so tailor your focus:
        - explainer: emphasize how things work, data flows, and concepts to clarify
        - review: emphasize quality concerns, risks, and areas needing scrutiny
        - redesign: emphasize pain points, limitations, and opportunities for improvement

      Output a structured survey document with clear sections so the code explorer
      knows exactly where to look and the architecture critic knows what to evaluate.

  # ---------------------------------------------------------------------------
  # Step 2: Explore — deep dive into the identified targets
  # ---------------------------------------------------------------------------
  - id: "explore"
    agent: "project-architect:code-explorer"
    timeout: 600
    output: "exploration_document"
    depends_on: ["survey"]
    prompt: |
      Perform a deep code exploration for the following target:

        Target: {{target}}

      The project surveyor has already scoped the landscape. Use this survey as your
      guide — follow the exploration targets and focus areas it identifies:

      --- SURVEY DOCUMENT ---
      {{survey_document}}
      --- END SURVEY ---

      Your job:
        - Follow the surveyor's exploration targets methodically
        - Discover the full scope: read every relevant file, class, and function
        - Trace execution paths and data flows end-to-end
        - Map dependencies: what does each component depend on, what depends on it
        - Catalog important data structures, interfaces, and contracts
        - Note questions, surprises, or inconsistencies for the evaluator

      Produce a detailed exploration document: concrete evidence, actual code
      references, and factual observations. No evaluation or recommendations yet —
      just thorough, accurate discovery.

  # ---------------------------------------------------------------------------
  # Step 3: Evaluate — apply architectural judgment and produce the report
  # ---------------------------------------------------------------------------
  - id: "evaluate"
    agent: "project-architect:architecture-critic"
    timeout: 600
    output: "final_report"
    depends_on: ["explore"]
    prompt: |
      Produce a {{report_type}} report for the following target:

        Target: {{target}}
        Report type: {{report_type}}

      You have the full survey and exploration context below. Your job is to apply
      rigorous architectural judgment and produce the final deliverable.

      --- SURVEY DOCUMENT ---
      {{survey_document}}
      --- END SURVEY ---

      --- EXPLORATION DOCUMENT ---
      {{exploration_document}}
      --- END EXPLORATION ---

      Instructions:
        1. Load your skills before writing:
           - report-formats (from project-architect bundle) — use the correct
             structure and sections for a {{report_type}} report
           - architecture-principles (from project-architect bundle) — apply
             relevant principles; not every principle applies to every target
           - diagram-conventions (from project-architect bundle) — include
             diagrams where they aid understanding

        2. Apply principles selectively — only raise findings that are supported
           by evidence from the exploration. Do not manufacture concerns.

        3. Every finding must reference specific code: file paths, function names,
           line numbers where possible.

        4. Every recommendation must be concrete and actionable: what to change,
           how to change it, and why it improves the architecture.

        5. Match the report type:
           - explainer: clear explanations, annotated diagrams, concept walkthrough
           - review: findings with severity, evidence, and actionable recommendations
           - redesign: current state analysis, proposed design, migration considerations

      Produce a complete, well-structured report ready for the engineering team.

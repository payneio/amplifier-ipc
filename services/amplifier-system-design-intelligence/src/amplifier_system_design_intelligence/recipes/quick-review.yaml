name: "quick-review"
description: "Quick architectural review that skips the survey and explorer phases — direct-to-critic evaluation for when you already know what to look at"
version: "1.0.0"
tags: ["architecture", "review", "quick"]

context:
  target: ""
  focus: ""

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Review — apply architectural judgment directly on the target
  # ---------------------------------------------------------------------------
  - id: "review"
    agent: "project-architect:architecture-critic"
    timeout: 600
    output: "review_report"
    prompt: |
      Perform a quick review of the following target:

        Target: {{target}}
        Focus:  {{focus}}

      This is a quick review — there are no survey or exploration documents.
      You will read the target directly and apply your judgment without
      prior survey or exploration phases.

      Instructions:

        1. Load your skills before writing:
           - report-formats (from project-architect bundle) — use the 'review'
             template structure and sections
           - architecture-principles (from project-architect bundle) — apply
             principles relevant to the focus area: {{focus}}
           - diagram-conventions (from project-architect bundle) — include
             diagrams if they aid understanding

        2. Guidelines for this quick review:
           - Read the target directly: open the files, trace the code
           - Focus specifically on: {{focus}} — do not wander into unrelated areas
           - Reference findings by file path and line number (file:line) wherever possible
           - Propose concrete alternatives for every issue you raise — not just
             "this is bad" but "here is a better approach and why"
           - Note the limitations of this quick review: what you could not assess
             without a full exploration, and what may be outside your line of sight
           - Keep it concise — this is a targeted review, not a comprehensive audit

        3. Every finding must be supported by evidence from the code you read.
           Do not manufacture concerns or repeat generic advice.

        4. Every recommendation must be actionable: what to change, how to change
           it, and why it improves the architecture.

      Produce a focused, well-structured review report ready for the engineering team.

# Routing Matrix: anthropic
#
# Anthropic-only routing. All roles use Claude models exclusively.
# Use when you want to run entirely on your Anthropic API account.
#
# Required roles: "general" and "fast" must be defined in every matrix.
# See docs/MATRIX_CURATOR_GUIDE.md for schema details.

name: anthropic
description: "Anthropic-only routing. All roles use Claude models exclusively."
updated: "2026-03-06"

roles:
  general:
    description: "Versatile catch-all, no specialization needed"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  fast:
    description: "Quick utility tasks — parsing, classification, file ops, bulk work"
    candidates:
      - provider: anthropic
        model: claude-haiku-4-5

  coding:
    description: "Code generation, implementation, debugging"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  ui-coding:
    description: "Frontend/UI code — components, layouts, styling, spatial reasoning"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  security-audit:
    description: "Vulnerability assessment, attack surface analysis, code auditing"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6
        config:
          reasoning_effort: high

  reasoning:
    description: "Deep architectural reasoning, system design, complex multi-step analysis"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6
        config:
          reasoning_effort: high

  critique:
    description: "Analytical evaluation — finding flaws in existing work, not generating solutions"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6
        config:
          reasoning_effort: extra_high

  creative:
    description: "Design direction, aesthetic judgment, high-quality creative output"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

  writing:
    description: "Long-form content — documentation, marketing, case studies, storytelling"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

  research:
    description: "Deep investigation, information synthesis across multiple sources"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6
        config:
          reasoning_effort: high

  vision:
    description: "Understanding visual input — screenshots, diagrams, UI mockups"
    candidates:
      - provider: anthropic
        model: claude-sonnet-4-6

  image-gen:
    # Anthropic has no native image generation API. Falls back to the best
    # creative model for image planning, prompt crafting, and SVG/ASCII art.
    description: "Image generation (limited — no native Anthropic image API)"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

  critical-ops:
    description: "High-reliability operational tasks — infrastructure, orchestration, coordination"
    candidates:
      - provider: anthropic
        model: claude-opus-4-6

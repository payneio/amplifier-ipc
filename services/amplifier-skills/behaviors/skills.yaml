behavior:
  name: skills-behavior
  version: 1.0.0
  description: 'Full skills support: tool-skills module, context instructions, and

    Microsoft-curated skills collection (image-vision, etc.).


    Compose this behavior to get batteries-included skills support with

    curated skills pre-configured alongside workspace and user skills.

    '
  tools:
  - class: amplifier_skills.tools.skills.SkillsTool
    config:
      skills:
      - git+https://github.com/microsoft/amplifier-bundle-skills@main#subdirectory=skills
      visibility:
        enabled: true
        inject_role: user
        max_skills_visible: 50
        ephemeral: true
        priority: 20
  context:
    include:
    - context/skills-instructions.md
